<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💛 Our Safe Space</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #ffd6e0, #ffe5b4);
  padding: 20px;
}

.container { max-width: 700px; margin: auto; }

input, textarea, select {
  width: 100%; padding: 10px; margin: 5px 0; border-radius: 10px;
}

button {
  padding: 10px; border-radius: 10px;
  background: #ff4d6d; color: white; border: none;
}

#messages { max-height: 250px; overflow-y: auto; }

.message { max-width: 70%; padding: 10px; margin: 5px; border-radius: 15px; }
.me { background: #ff4d6d; color: white; margin-left: auto; }
.her { background: white; margin-right: auto; }

.section {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>💛 Our Safe Space</h2>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<p id="welcome"></p>

<select id="mood">
  <option value="1">Upset 😔</option>
  <option value="2">Confused 😕</option>
  <option value="3">Neutral 😐</option>
  <option value="4">Happy 😊</option>
</select>

<textarea id="message"></textarea>
<button onclick="sendMessage()">Send</button>

<div id="messages"></div>

<!-- 📈 MOOD CHART -->
<div class="section">
  <h3>📈 Mood Trend</h3>
  <canvas id="chart"></canvas>
</div>

<!-- ❤️ WEEKLY SUMMARY -->
<div class="section">
  <h3>❤️ Weekly Review</h3>
  <button onclick="generateSummary()">Generate Summary</button>
  <p id="summary"></p>
</div>

<!-- 🤖 AI COACH -->
<div class="section">
  <h3>🤖 Relationship Coach</h3>
  <textarea id="aiInput" placeholder="Describe the issue..."></textarea>
  <button onclick="askAI()">Get Advice</button>
  <p id="aiResponse"></p>
</div>

<button onclick="logout()">Logout</button>

</div>
</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyByPtGUddTNWVsEByuUlxEVfsSjOrSPOW8",
  authDomain: "lesmir-app.firebaseapp.com",
  projectId: "lesmir-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let moodData = [];

// AUTH
function signup(){ auth.createUserWithEmailAndPassword(email.value, password.value); }
function login(){ auth.signInWithEmailAndPassword(email.value, password.value); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    login.style.display="none";
    app.style.display="block";
    welcome.innerText=user.email;
    loadMessages(user);
  } else {
    login.style.display="block";
    app.style.display="none";
  }
});

// SEND MESSAGE
function sendMessage(){
  db.collection("messages").add({
    text: message.value,
    mood: Number(mood.value),
    user: auth.currentUser.email,
    date: new Date().toISOString()
  });
  message.value="";
}

// LOAD + CHART
function loadMessages(user){
  db.collection("messages").orderBy("date")
  .onSnapshot(snapshot=>{
    let html="";
    moodData=[];

    snapshot.forEach(doc=>{
      const m=doc.data();
      moodData.push(m.mood);

      const side = m.user===user.email?"me":"her";

      html+=`<div class="message ${side}">
        <p>${m.text}</p>
      </div>`;
    });

    messages.innerHTML=html;
    drawChart();
  });
}

// 📈 CHART
function drawChart(){
  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: moodData.map((_,i)=>i+1),
      datasets: [{
        label: "Mood Trend",
        data: moodData
      }]
    }
  });
}

// ❤️ WEEKLY SUMMARY
function generateSummary(){
  const avg = moodData.reduce((a,b)=>a+b,0)/moodData.length;

  let text="";

  if(avg > 3) text="Things are going well ❤️";
  else if(avg > 2) text="There’s balance, but room to improve 🤝";
  else text="There are some struggles, communication is needed 💬";

  summary.innerText = text;
}

// 🤖 AI COACH
async function askAI(){
  const text = aiInput.value;

  const res = await fetch("/api/ai", {
    method: "POST",
    body: JSON.stringify({
      text: `Give relationship advice for this situation: ${text}`
    })
  });

  const data = await res.json();
  aiResponse.innerText = data.reply;
}
</script>

</body>
</html>
