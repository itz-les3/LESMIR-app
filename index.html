<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💛 Our Safe Space</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #ffd6e0, #ffe5b4);
  padding: 20px;
}
.container { max-width: 700px; margin: auto; }
input, textarea, select {
  width: 100%; padding: 10px; margin: 5px 0; border-radius: 10px;
}
button {
  padding: 10px; border-radius: 10px;
  background: #ff4d6d; color: white; border: none;
}
#messages { max-height: 250px; overflow-y: auto; }
.message { max-width: 70%; padding: 10px; margin: 5px; border-radius: 15px; }
.me { background: #ff4d6d; color: white; margin-left: auto; }
.her { background: white; margin-right: auto; }
.section {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>💛 Our Safe Space</h2>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
  <button onclick="signupUser()">Sign Up</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<p id="welcome"></p>

<select id="mood">
  <option value="1">Upset 😔</option>
  <option value="2">Confused 😕</option>
  <option value="3">Neutral 😐</option>
  <option value="4">Happy 😊</option>
</select>

<textarea id="message" placeholder="Say it calmly..."
oninput="setTyping(true)" onblur="setTyping(false)"></textarea>

<p id="typingStatus" style="font-size:12px;color:gray;"></p>

<button onclick="aiRewrite()">🧠 Rephrase</button>
<button onclick="sendMessage()">Send</button>

<div id="messages"></div>

<!-- ❤️ CHECKINS -->
<div class="section">
<h3>❤️ Daily Check-ins</h3>

<div style="display:flex; gap:10px;">
  <div style="flex:1;">
    <h4>Me</h4>
    <div id="myCheckins"></div>
  </div>
  <div style="flex:1;">
    <h4>Her</h4>
    <div id="herCheckins"></div>
  </div>
</div>

<textarea id="checkinText"></textarea>
<button onclick="submitCheckin()">Submit</button>
</div>

<!-- 📊 DASHBOARD -->
<div class="section">
<h3>📊 Dashboard</h3>
<p>Total Messages: <span id="totalMsg">0</span></p>
<p>Positive %: <span id="positive">0%</span></p>
</div>

<!-- 📈 CHART -->
<div class="section">
<h3>📈 Mood Trend</h3>
<canvas id="chart"></canvas>
</div>

<!-- ❤️ SUMMARY -->
<div class="section">
<h3>❤️ Weekly Summary</h3>
<button onclick="generateSummary()">Generate</button>
<p id="summary"></p>
</div>

<!-- 🤖 AI -->
<div class="section">
<h3>🤖 AI Coach</h3>
<textarea id="aiInput"></textarea>
<button onclick="askAI()">Get Advice</button>
<p id="aiResponse"></p>
</div>

<button onclick="logoutUser()">Logout</button>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AGFUEUGISDJF88IEIGE89G89849",
  authDomain: "lesmir-app.firebaseapp.com",
  projectId: "lesmir-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let moodData = [];

// AUTH
function signupUser(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(()=>alert("Account created"))
  .catch(e=>alert(e.message));
}
function loginUser(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .catch(e=>alert(e.message));
}
function logoutUser(){ auth.signOut(); }

// AUTH STATE
auth.onAuthStateChanged(user=>{
  const loginDiv = document.getElementById("login");
  const appDiv = document.getElementById("app");

  if(user){
    loginDiv.style.display="none";
    appDiv.style.display="block";
    welcome.innerText=user.email;

    loadMessages(user);
    loadCheckins(user);
    listenTyping(user);

  } else {
    loginDiv.style.display="block";
    appDiv.style.display="none";
  }
});

// SEND
function sendMessage(){
  db.collection("messages").add({
    text: message.value,
    mood: Number(mood.value),
    user: auth.currentUser.email,
    date: new Date().toISOString()
  });
  message.value="";
}

// LOAD
function loadMessages(user){
  db.collection("messages").orderBy("date")
  .onSnapshot(snapshot=>{
    let html="";
    let positive=0;
    moodData=[];

    snapshot.forEach(doc=>{
      const m=doc.data();
      moodData.push(m.mood);
      if(m.mood===4) positive++;

      const side=m.user===user.email?"me":"her";

      html+=`<div class="message ${side}">
        <p>${m.text}</p>
      </div>`;
    });

    messages.innerHTML=html;
    totalMsg.innerText=snapshot.size;
    positive.innerText = snapshot.size ? Math.round((positive/snapshot.size)*100)+"%" : "0%";

    drawChart();
  });
}

// CHART
function drawChart(){
  new Chart(chart, {
    type:"line",
    data:{ labels:moodData.map((_,i)=>i+1), datasets:[{ data:moodData }] }
  });
}

// CHECKINS
function submitCheckin(){
  db.collection("checkins").add({
    text:checkinText.value,
    user:auth.currentUser.email,
    date:new Date().toISOString()
  });
  checkinText.value="";
}

function loadCheckins(user){
  db.collection("checkins").orderBy("date")
  .onSnapshot(snapshot=>{
    let mine="", hers="";

    snapshot.forEach(doc=>{
      const c=doc.data();
      if(c.user===user.email) mine+=`<p>${c.text}</p>`;
      else hers+=`<p>${c.text}</p>`;
    });

    myCheckins.innerHTML=mine;
    herCheckins.innerHTML=hers;
  });
}

// TYPING
function setTyping(val){
  db.collection("typing").doc(auth.currentUser.email).set({typing:val});
}

function listenTyping(user){
  db.collection("typing").onSnapshot(snapshot=>{
    let typing=false;
    snapshot.forEach(doc=>{
      if(doc.id!==user.email && doc.data().typing) typing=true;
    });
    typingStatus.innerText = typing ? "Typing..." : "";
  });
}

// SUMMARY
function generateSummary(){
  const avg = moodData.reduce((a,b)=>a+b,0)/moodData.length;
  summary.innerText = avg>3 ? "Things are going well ❤️" :
                       avg>2 ? "Some balance 🤝" :
                       "Needs attention 💬";
}

// AI (safe fallback)
async function askAI(){
  try{
    const res = await fetch("/api/ai",{method:"POST",body:JSON.stringify({text:aiInput.value})});
    const data = await res.json();
    aiResponse.innerText = data.reply;
  } catch {
    aiResponse.innerText = "Try talking calmly and expressing how you feel.";
  }
}

// SIMPLE AI rewrite
function aiRewrite(){
  message.value = "I feel that " + message.value + ", and I’d like us to understand each other better.";
}
</script>

</body>
</html>
