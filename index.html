<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💛 Our Safe Space</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #ffd6e0, #ffe5b4);
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
}

button {
  padding: 10px;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  border: none;
  cursor: pointer;
}

#messages {
  max-height: 250px;
  overflow-y: auto;
}

.message {
  max-width: 70%;
  padding: 10px;
  margin: 5px;
  border-radius: 15px;
}

.me { background: #ff4d6d; color: white; margin-left: auto; }
.her { background: white; margin-right: auto; }

.section {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>💛 Our Safe Space</h2>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
  <button onclick="signupUser()">Sign Up</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<p id="welcome"></p>

<select id="mood">
  <option value="1">Upset 😔</option>
  <option value="2">Confused 😕</option>
  <option value="3">Neutral 😐</option>
  <option value="4">Happy 😊</option>
</select>

<textarea id="message" placeholder="Say something..."></textarea>
<button onclick="sendMessage()">Send</button>

<div id="messages"></div>

<button onclick="logoutUser()">Logout</button>

</div>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyByPtGUddTNWVsEByuUlxEVfsSjOrSPOW8",
  authDomain: "lesmir-app.firebaseapp.com",
  projectId: "lesmir-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 SIGN UP
function signupUser() {
  const emailVal = document.getElementById("email").value;
  const passVal = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(emailVal, passVal)
    .then(() => alert("Account created ✅"))
    .catch(err => alert(err.message));
}

// 🔐 LOGIN
function loginUser() {
  const emailVal = document.getElementById("email").value;
  const passVal = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(emailVal, passVal)
    .then(() => alert("Login successful ✅"))
    .catch(err => alert(err.message));
}

// 🔐 LOGOUT
function logoutUser() {
  auth.signOut();
}

// 👀 AUTH STATE (FIXED)
auth.onAuthStateChanged(user => {
  console.log("AUTH STATE:", user); // debug

  const loginDiv = document.getElementById("login");
  const appDiv = document.getElementById("app");

  if (user) {
    loginDiv.style.display = "none";
    appDiv.style.display = "block";

    document.getElementById("welcome").innerText =
      "Logged in as: " + user.email;

    loadMessages(user);

  } else {
    loginDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// 📩 SEND MESSAGE
function sendMessage() {
  const text = document.getElementById("message").value;

  if (!text.trim()) return;

  db.collection("messages").add({
    text,
    mood: document.getElementById("mood").value,
    user: auth.currentUser.email,
    date: new Date().toISOString()
  });

  document.getElementById("message").value = "";
}

// 📡 LOAD MESSAGES
function loadMessages(user) {
  db.collection("messages")
    .orderBy("date")
    .onSnapshot(snapshot => {

      let html = "";

      snapshot.forEach(doc => {
        const msg = doc.data();
        const side = msg.user === user.email ? "me" : "her";

        html += `
          <div class="message ${side}">
            <p>${msg.text}</p>
          </div>
        `;
      });

      document.getElementById("messages").innerHTML = html;

      const box = document.getElementById("messages");
      box.scrollTop = box.scrollHeight;
    });
}
</script>

</body>
</html>
